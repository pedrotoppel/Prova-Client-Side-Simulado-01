<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>De Boas</title>
</head>
<body class="flex justify-center">

    <!-- ============================================================================= -->

    <section class="flex h-[480px] flex-col w-[320px] border">
        <div class="flex h-[150px] w-[320px] border-b-1">
            <button onclick="voltar()" class="cursor-pointer h-6 p-2 mt-1">
                <img src="img/icon/arrow.png" class="flex h-6 rotate-180 self-center justify-center hover:bg-gray-300 rounded-md" alt="Botao voltar">
            </button>
            <div class="flex flex-col justify-between items-center p-4 ml-5">
                <img src="img/avatar/BobFeliz.png" class="border h-[80px] w-[80px] rounded-full transition duration-1000" alt="AvatarPreguiça" id="imagem">
                <h2 class="">MINHAS ESTATÍSTICAS</h2>
            </div>
        </div>

        <!-- ================================================================== -->

        <div class="flex flex-col h-[330px] justify-between p-5 bg-blue-200">
            <div class="flex flex-col justify-center items-center">
                <div class="flex items-center justify-center">
                    <img src="img/icon/Estatisticas/check.png" class="flex h-4 w-4" alt="icon Check">
                    <p class="text-sm ml-1">MEDITAÇÕES REALIZADAS</p>
                </div>
                <div class="flex border h-[60px] w-[150px] items-center justify-center rounded-sm p-1 mt-1 bg-white">
                    <h1 class="text-6xl font-semibold mb-1" id="numeroMeditacoes"></h1>
                    <p class="flex self-end ml-1 font-semibold text-lg">sessões</p>
                </div>
            </div>

            <div class="flex flex-col justify-center items-center">
                <div class="flex items-center justify-center">
                    <img src="img/icon/Estatisticas/clock.png" class="flex h-4 w-4" alt="icon Check">
                    <p class="text-sm ml-1">TEMPO TOTAL MEDITANDO</p>
                </div>
                <div class="flex border h-[60px] w-[150px] items-center justify-center rounded-sm p-1 mt-1 bg-white">
                    <time class="flex h-full w-full justify-center items-center text-truncate text-5xl font-semibold" id="tempoTotalMeditando"></time>
                </div>
            </div>
            
            <div class="flex flex-col justify-center items-center">
                <div class="flex items-center justify-center">
                    <img src="img/icon/Estatisticas/bullseye.png" class="flex h-4 w-4" alt="icon Check">
                    <p class="text-sm ml-1">OBJETIVO MAIS UTILIZADO</p>
                </div>
                <div class="flex border h-[60px] w-[150px] items-center justify-center rounded-sm p-1 mt-1 bg-white">
                    <p class="flex font-semibold text-center text-lg" id="objetivoMaisUsado"></p>
                </div>
            </div>            

        </div>

    </section>
    <script src="js/estatisticas.js"></script>
</body>
</html>
