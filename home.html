<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>DeBoas</title>
</head>

<body class="flex justify-center">
    <div class="flex flex-col h-[480px] w-[320px] border m-0 p-0">
        <section class="flex justify-between h-[60px] w-full p-2 border-b-2">
            <button onclick="goToVoltar()" class="cursor-pointer hover:bg-gray-300 rounded-md">
                <img src="img/icon/arrow.png" class="flex h-6 rotate-180 items-center justify-center"
                    alt="Botao voltar">
            </button>
            <h1 class="flex text-2xl justify-center items-center">OBJETIVOS</h1>
            <button onclick="goToStats()" class="cursor-pointer">
                <img src="img/icon/stats.png" class="flex h-7 items-center justify-center hover:bg-gray-300 rounded-md" alt="Estatisticas">
            </button>
        </section>
        <!-- =============================== BOB 1 ============================ -->
        <section>
            <button onclick="goToPlayerBob1()"
                class="flex h-[140px] w-full bg-green-200 hover:bg-green-400 p-3 justify-between items-center gap-3 cursor-pointer">
                <div class="flex gap-3 items-end">
                    <div class="p-2 h-[120px] w-[150px]">
                        <img src="img/BobObjetivos/BobSussa.PNG" class="h-full transition duration-1000"
                            alt="ImagemBOBteste" id="Bob1">
                    </div>
                    <div class="flex flex-col ">
                        <h1 class="text-left text-xl leading-none mt-7">FICAR<br>SUSSA</h1>
                        <p class="text-xs text-left w-auto mt-2 mb-1">Relaxar, reduzir ansiedade e o stress</p>
                    </div>
                </div>
                <img src="img/icon/arrow.png" class="flex h-9 items-center justify-center" alt="Botao avançar">
            </button>

            <!-- ========================== BOB 2 ============================== -->
            <button onclick="goToPlayerBob2()"
                class="flex h-[140px] w-full bg-red-200 hover:bg-red-400 p-3 justify-between items-center gap-3 cursor-pointer">
                <div class="flex gap-3 items-end">
                    <div class="p-2 h-[120px] w-[110px]">
                        <img src="img/BobObjetivos/BobOlhaFoca.PNG"
                            class="flex h-[100%] justify-center items-center transition duration-1000"
                            alt="ImagemBOBteste" id="Bob2">
                    </div>
                    <div class="flex flex-col ">
                        <h1 class="text-left text-xl leading-none mt-7">FOCAR<br>NA TAREFA</h1>
                        <p class="text-xs text-left w-auto mt-4 mb-1">Aumentar o Foco</p>
                    </div>
                </div>
                <img src="img/icon/arrow.png" class="flex h-9 items-center justify-center" alt="Botao avançar">
            </button>

            <!-- =========================== BOB 3 =========================================== -->
            <button onclick="goToPlayerBob3()"
                class="flex h-[140px] w-full bg-blue-200 hover:bg-blue-400 p-3 justify-between items-center gap-3 cursor-pointer">
                <div class="flex gap-3 items-end">
                    <div class="p-2 h-[120px] w-[110px]">
                        <img src="img/BobObjetivos/BobDormir.PNG"
                            class="flex h-[100%] justify-center items-center transition duration-1200"
                            alt="ImagemBOBteste" id="Bob3">
                    </div>
                    <div class="flex flex-col ">
                        <h1 class="text-left text-xl leading-none mt-7">DORMIR<br>DE BOAS</h1>
                        <p class="text-xs text-left w-auto mt-4 mb-1">Dormir Melhor</p>
                    </div>
                </div>
                <img src="img/icon/arrow.png" class="flex h-9 items-center justify-center" alt="Botao avançar">
            </button>

        </section>
    </div>

    <script src="js/home.js"></script>
</body>

</html>
